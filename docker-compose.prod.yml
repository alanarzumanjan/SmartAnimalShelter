services:
  postgres:
    image: postgres:16
    container_name: shelter_postgres
    environment:
      POSTGRES_DB: ${DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shelter_network
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: shelter_mongodb
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shelter_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: shelter_redis
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shelter_network
    restart: unless-stopped

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/your-repo}/backend:latest
    container_name: shelter_backend
    env_file:
      - .env
    environment:
      TZ: Europe/Riga
      ASPNETCORE_URLS: http://+:5000
      ASPNETCORE_ENVIRONMENT: Production
      POSTGRES_CONNECTION_STRING: "Host=postgres;Port=5432;Database=${DATABASE};Username=${POSTGRES_USER};Password=${PASSWORD};"
      MONGODB_CONNECTION_STRING: "mongodb://mongodb:27017"
      REDIS_CONNECTION_STRING: "redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"
    networks:
      - shelter_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/your-repo}/frontend:latest
    container_name: shelter_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    networks:
      - shelter_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  pgdata:
  mongodata:
  redisdata:

networks:
  shelter_network:
    driver: bridge

