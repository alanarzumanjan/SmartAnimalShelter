name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master, dev, hotfix, hotfix/**]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after build'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend

jobs:
  version:
    name: Generate Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      branch_tag: ${{ steps.version.outputs.branch_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

          # Determine branch tag
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            echo "branch_tag=latest" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "dev" || "$BRANCH" == "dev2" ]]; then
            echo "branch_tag=dev" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "hotfix" ]]; then
            echo "branch_tag=hotfix" >> $GITHUB_OUTPUT
          else
            echo "branch_tag=$BRANCH" >> $GITHUB_OUTPUT
          fi

          # Generate semantic version
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            LAST_TAG=$(git describe --tags --abbrev=0)
            echo "version=${LAST_TAG}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: version
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: |
          echo "BACKEND_IMAGE=${GITHUB_REPOSITORY@L}/backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${GITHUB_REPOSITORY@L}/frontend" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=${{ needs.version.outputs.branch_tag }}
            type=raw,value=${{ needs.version.outputs.version }}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push backend
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ needs.version.outputs.branch_tag }}
          format: spdx-json
          output-file: backend-sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: backend-sbom.spdx.json

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: version
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: |
          echo "BACKEND_IMAGE=${GITHUB_REPOSITORY@L}/backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${GITHUB_REPOSITORY@L}/frontend" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=${{ needs.version.outputs.branch_tag }}
            type=raw,value=${{ needs.version.outputs.version }}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push frontend
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ needs.version.outputs.branch_tag }}
          format: spdx-json
          output-file: frontend-sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: frontend-sbom
          path: frontend-sbom.spdx.json

  cleanup-old-images:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-backend, build-frontend]
    if: ${{ always() && needs.build-backend.result == 'success' && needs.build-frontend.result == 'success' }}
    permissions:
      packages: write

    steps:
      - name: Delete old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'smartanimalshelter/backend'
          package-type: 'container'
          min-versions-to-keep: 10
          delete-only-untagged-versions: true

      - name: Delete old frontend versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'smartanimalshelter/frontend'
          package-type: 'container'
          min-versions-to-keep: 10
          delete-only-untagged-versions: true
