name: CI

on:
  pull_request:
    branches: [master, main, dev, hotfix, hotfix/**]
  push:
    branches: [master, main, dev, hotfix, hotfix/**]
  workflow_dispatch:
    inputs:
      run_backend_tests:
        description: "Run backend test suite"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: "9.0.x"
  NODE_VERSION: "20"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'tests/**'
            frontend:
              - 'frontend/**'
            docker:
              - 'backend/Dockerfile'
              - 'frontend/docker/Dockerfile'
              - 'docker-compose*.yml'
              - 'cloudflared.Dockerfile'
            workflows:
              - '.github/workflows/**'

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: ./
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shelter_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      mongodb:
        image: mongo:7
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
    env:
      ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY || secrets.ENCRYPTION_KEY }}
      JWT_KEY: ${{ secrets.TEST_JWT_KEY || secrets.JWT_KEY }}
      JWT_ISSUER: ${{ secrets.TEST_JWT_ISSUER || secrets.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ secrets.TEST_JWT_AUDIENCE || secrets.JWT_AUDIENCE }}
      EMAIL_ADDRESS: ${{ secrets.TEST_EMAIL_ADDRESS || secrets.EMAIL_ADDRESS }}
      EMAIL_PASSWORD: ${{ secrets.TEST_EMAIL_PASSWORD || secrets.EMAIL_PASSWORD }}
      EMAIL_NAME: ${{ secrets.TEST_EMAIL_NAME || secrets.EMAIL_NAME }}
      POSTGRES_CONNECTION_STRING: ${{ secrets.TEST_POSTGRES_CONNECTION_STRING || secrets.POSTGRES_CONNECTION_STRING }}
      REDIS_CONNECTION_STRING: ${{ secrets.TEST_REDIS_CONNECTION_STRING || secrets.REDIS_CONNECTION_STRING }}
      MONGODB_CONNECTION_STRING: ${{ secrets.TEST_MONGODB_CONNECTION_STRING || secrets.MONGODB_CONNECTION_STRING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.0.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4.2.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/backend.csproj', 'tests/tests.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore tests/tests.csproj

      - name: Build
        run: dotnet build tests/tests.csproj --no-restore --configuration Release

      - name: Check formatting
        run: dotnet format backend/backend.slnx --verify-no-changes --no-restore

      - name: Run backend tests
        if: ${{ github.event.inputs.run_backend_tests != 'false' }}
        run: dotnet test tests/tests.csproj --no-build --configuration Release --verbosity normal

      - name: Upload test results
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: backend-test-results
          path: tests/TestResults/

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Type check
        run: npx tsc --noEmit

      - name: Run component tests
        run: npm run test

      - name: Upload test results
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: frontend-test-results
          path: frontend/coverage/

  docker-build-test:
    name: Docker Smoke Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6.19.0
        with:
          context: ./backend
          push: false
          load: false
          tags: backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6.19.0
        with:
          context: ./frontend
          file: ./frontend/docker/Dockerfile
          push: false
          load: false
          tags: frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend, frontend]
    if: ${{ always() && (needs.backend.result == 'success' || needs.frontend.result == 'success') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "./backend"
          format: "sarif"
          output: "trivy-backend-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "./frontend"
          format: "sarif"
          output: "trivy-frontend-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: trivy-scan-results
          path: trivy-*.sarif
