name: CI

on:
  pull_request:
    branches: [main, master]

env:
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20'

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shelter_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      mongodb:
        image: mongo:6.0
        options: >-
          --health-cmd "mongosh --eval db.adminCommand('ping')"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore backend.slnx

      - name: Build
        run: dotnet build backend.slnx --no-restore --configuration Release

      - name: Install dotnet-format
        run: dotnet tool install -g dotnet-format || true

      - name: Check formatting
        run: dotnet format --verify-no-changes --no-restore backend.slnx
        continue-on-error: true

      - name: Run unit tests
        run: dotnet test backend.Tests/backend.Tests.csproj --no-build --verbosity normal --filter "FullyQualifiedName~UnitTest1"
        env:
          POSTGRES_CONNECTION_STRING: "Host=localhost;Port=5432;Database=shelter_test;Username=test;Password=test;"
          REDIS_CONNECTION_STRING: "localhost:6379"
          MONGODB_CONNECTION_STRING: "mongodb://localhost:27017"

      - name: Run integration tests
        run: dotnet test backend.Tests/backend.Tests.csproj --no-build --verbosity normal --filter "FullyQualifiedName~IntegrationTest1"
        env:
          POSTGRES_CONNECTION_STRING: "Host=localhost;Port=5432;Database=shelter_test;Username=test;Password=test;"
          REDIS_CONNECTION_STRING: "localhost:6379"
          MONGODB_CONNECTION_STRING: "mongodb://localhost:27017"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend.Tests/TestResults/

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npm run format:check
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit

      - name: Run component tests
        run: npm run test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: frontend/coverage/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'Dockerfile'
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'Dockerfile'
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-results
          path: trivy-*.sarif

