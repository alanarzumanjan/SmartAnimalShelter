name: CI + Deploy

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Test encryption key (base64-encoded 32 random bytes)
      # Generate: openssl rand -base64 32
      ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet build backend/backend.csproj

      - name: Test
        run: dotnet test tests/tests.csproj --verbosity normal

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Production
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          # Add other production secrets here:
          # DATABASE: ${{ secrets.DATABASE }}
          # POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          # PASSWORD: ${{ secrets.PASSWORD }}
          # JWT_KEY: ${{ secrets.JWT_KEY }}
        run: |
          echo "Deploying with production ENCRYPTION_KEY from GitHub Secrets..."
          # Example: scp / rsync / docker-compose up
          # docker compose -f docker-compose.prod.yml up -d --build
